name: 💡 Идея / предложение
description: Идея механики, NPC, рецепта, баланса, лора, UI-улучшения.
title: "[IDEA] "
labels: ["idea", "triage"]
body:
  - type: textarea
    id: idea
    attributes:
      label: В чём идея
      placeholder: |
        Добавить в карточку рецепта еды строку «+15 выносливости» — сейчас приходится открывать инвентарь, чтобы понять, что выгоднее крафтить.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Какую проблему это решает
      placeholder: |
        Без выносливости в карточке невозможно сравнить рецепты, не выходя из крафта.
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот / контекст
      description: По желанию — скрин экрана, к которому относится идея.
