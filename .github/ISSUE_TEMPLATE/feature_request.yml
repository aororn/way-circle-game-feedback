name: 💡 Идея / предложение
description: Идея новой механики, NPC, рецепта, баланс, лор, UI-улучшение.
title: "[IDEA] "
labels: ["idea", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо, что делишься идеей! Не все идеи попадут в игру — но все будут прочитаны.
        Поля со ⭐ обязательные.

  - type: dropdown
    id: area
    attributes:
      label: ⭐ К какой области относится
      multiple: true
      options:
        - Геймплей / новая механика
        - Баланс (стоимость, время, шанс, награда)
        - NPC — диалоги / характер / квесты
        - Новый NPC / новый квест
        - Новый рецепт / ресурс / здание
        - Лор / нарратив / тексты
        - UI — что добавить, убрать, переделать
        - Подсказки / онбординг новичков
        - Прогрессия / пейсинг (★3 → ★10)
        - Экономика / торговля / Ракот
        - Бой / стохастические события
        - Анимации / звук
        - Другое
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: ⭐ В чём идея
      description: Опиши коротко — что предлагаешь?
      placeholder: |
        Добавить в карточку рецепта еды строку "+15 выносливости" под названием. Сейчас приходится открывать сам предмет в инвентаре, чтобы посмотреть, что он даёт.

        Или:

        Сделать у Ракота отдельный диалог при ★5 — он впервые упоминает про "других координаторов". Сейчас при достижении ★5 у него тот же набор реплик, что и на ★3.

        Или:

        Добавить в подтаб "Действия" сортировку карточек по выносливости — сейчас порядок случайный.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: ⭐ Какую проблему это решает
      description: Зачем это нужно? Что сейчас не так или чего не хватает?
      placeholder: |
        Без указания выносливости в карточке еды я не могу выбрать, что выгоднее крафтить — приходится по очереди заходить в инвентарь и сравнивать.

        Или:

        После ★5 я несколько часов не понимал, что Ракот вообще "знает" о моём прогрессе — кажется, что мир не реагирует.

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативы
      description: Думал ли ты о других способах решить ту же проблему?
      placeholder: |
        Можно показывать выносливость не в карточке, а в тултипе при наведении — но на мобиле тултипа нет, поэтому лучше прямо в карточке.

  - type: input
    id: account
    attributes:
      label: Имя персонажа и звезда
      description: Поможет понять, на каком этапе игры ты этого хочешь.
      placeholder: "Тест1, ★3"

  - type: textarea
    id: extra
    attributes:
      label: Доп. контекст
      description: Скриншоты, ссылки, примеры из других игр — всё, что поможет понять идею.
