name: 🐛 Сообщить о баге
description: Что-то сломалось, не появляется, текст странный, награда не пришла, квест не идёт.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: textarea
    id: what_happened
    attributes:
      label: Что произошло
      description: Опиши проблему. Лучше с конкретными названиями (квест, NPC, ресурс).
      placeholder: |
        В подсказке квеста Страта на шаге «Обжечь первую посуду» написано «Серебрушка ×2 · гарант.» — слово «гарант» выбивается из лора.

        Или: в подтабе «Действия» нет карточки «Добыть камень».

        Или: в карточках рецептов еды нет указания, сколько восстанавливает выносливости.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Что ожидалось
      placeholder: |
        Слово «гарант» убрать или заменить на лорное.

        Или: карточка «Добыть камень» должна быть в подтабе «Действия».

        Или: в карточке еды должно быть «+15 выносливости».
    validations:
      required: true

  - type: input
    id: account
    attributes:
      label: Имя персонажа и звезда
      placeholder: "Тест1, ★3"

  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот
      description: Перетащи прямо сюда. Для странного текста и визуальных багов — самое важное.
