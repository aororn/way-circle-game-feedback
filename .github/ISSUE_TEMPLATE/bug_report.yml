name: 🐛 Сообщить о баге
description: Что-то сломалось, не появляется, текст странный, награда не пришла, квест не идёт.
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за репорт! Чем подробнее — тем быстрее починим.
        Поля со ⭐ обязательные. Остальные — по желанию.

  - type: dropdown
    id: kind
    attributes:
      label: ⭐ Тип бага
      description: Что именно произошло? Можно выбрать несколько.
      multiple: true
      options:
        - 📜 Квест — не продвигается / шаг не закрывается / банер боя застрял
        - 🎁 Награда — тост или лут не пришёл, серебрушка/предмет не зачислился
        - 🃏 Карточка отсутствует / не та (действие, рецепт, NPC, ресурс)
        - 📝 Странный текст — антилорный, нейро-копирайт, опечатка ("гарант.", "система отвечает...")
        - 🔍 Не хватает информации — нет цифр выносливости/здоровья/времени, непонятно что выгоднее
        - ⚖️ Цифры не сходятся — урон / стоимость / время / шанс посчитались неправильно
        - 🎨 Визуальный — иконка, верстка, анимация, что-то сломано в дизайне
        - 🚪 Не могу войти / зависло на загрузке / белый экран
        - 🤷 Другое
    validations:
      required: true

  - type: dropdown
    id: mechanic
    attributes:
      label: ⭐ Какая механика
      description: Где именно баг? Если несколько — выбери все.
      multiple: true
      options:
        - Квесты NPC (Страт, Ракот, охотник Ди, Паурита, Мирголо и др.)
        - Патрули
        - Крафт / рецепты
        - Добыча ресурсов (этажи Пустоши)
        - Бой / стохастические события
        - Торговля с Ракотом
        - Сад / выращивание
        - Готовка / еда / зелья
        - Инвентарь
        - NPC-помощники (наём, действия)
        - Здания / постройка
        - Престиж
        - Авто-производство
        - Звёзды / прокачка / культивация
        - UI / меню / навигация
        - Другое
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: ⭐ Что произошло
      description: Опиши проблему в 1–3 предложениях. Лучше с конкретными названиями (квест, NPC, ресурс).
      placeholder: |
        В квесте Страта на шаге "Обжечь первую посуду" в подсказке стоит "Серебрушка ×2 · гарант." — слово "гарант" выбивается из лора, режет глаз.

        Или:

        В подтабе "Действия" нет карточки "Добыть камень" — невозможно добывать большой и острый камень через этот подтаб.

        Или:

        В карточках рецептов еды нет указания сколько восстанавливает выносливости — невозможно понять, что выгоднее крафтить.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ⭐ Что ожидалось
      description: Как должно было быть, по-твоему?
      placeholder: |
        В нарративе квеста должно быть слово в стиле лора, например "наверняка", "верно", или вообще без пометки.

        Или:

        Карточка "Добыть камень" должна быть в подтабе "Действия", как карточки "Рубить дерево" и "Собирать траву".

        Или:

        В карточке еды должно быть указано "+15 выносливости" под названием.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги, чтобы воспроизвести
      description: Только если баг повторяется. Для опечаток и "не появляется карточка" — можно пропустить.
      placeholder: |
        1. Зайти в игру под аккаунтом ★3
        2. Открыть NPC → Страт → текущий квест
        3. На шаге 5 в карточке награды видна надпись "гарант."

  - type: input
    id: account
    attributes:
      label: Имя персонажа и звезда
      description: Очень помогает посмотреть твой прогресс в БД.
      placeholder: "Тест1, ★3"

  - type: input
    id: quest_or_npc
    attributes:
      label: Имя квеста / NPC / ресурса
      description: Если баг привязан к конкретному. Например — "квест Страта про печь", "NPC Ракот", "ресурс острый камень".

  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот / видео
      description: Перетащи прямо сюда. Для визуальных багов и странного текста — самое важное доказательство.

  - type: textarea
    id: extra
    attributes:
      label: Что ещё может быть полезно
      description: |
        Любые детали — что делал до бага, повторяется ли после перезагрузки, что-то странное в соседних карточках.
        Если умеешь — открой DevTools (F12 на десктопе) → вкладка Console → скопируй красные строки.
