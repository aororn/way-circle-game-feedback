name: ❓ Вопрос
description: Непонятно, как что-то работает, не нашёл механику, застрял в квесте.
title: "[Q] "
labels: ["question", "triage"]
body:
  - type: textarea
    id: question
    attributes:
      label: ⭐ Вопрос
      description: Что непонятно?
      placeholder: |
        Не могу понять, как открыть рецепт горшков у Страта — квест дошёл до шага "Обжечь первую посуду", но в крафте вкладка пуста.

        Или:

        Я на ★4 уже сутки, не понимаю, что делать дальше. У всех NPC висит "приходи позже". Это баг или я что-то пропустил?

        Или:

        Откуда вообще берётся "острый камень"? В подтабе "Действия" нет такой добычи.
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: Что уже пробовал
      description: Что ты сделал, чтобы разобраться самому? Перезагрузка, поиск в подсказках, обход всех NPC.
      placeholder: |
        Перезагрузил страницу, обошёл всех NPC, посмотрел в инвентаре — ничего нового.

  - type: input
    id: account
    attributes:
      label: Имя персонажа и звезда
      description: Поможет посмотреть твой прогресс в БД.
      placeholder: "Тест1, ★3"

  - type: dropdown
    id: device
    attributes:
      label: Устройство
      options:
        - Десктоп
        - Телефон Android
        - iPhone / iPad
      default: 0

  - type: textarea
    id: screenshot
    attributes:
      label: Скриншот
      description: Если "не вижу X" — приложи скрин экрана, где должно быть X.
